site_name: CanFlow Documentation
site_url: https://harshafaik.github.io/canflow/
repo_url: https://github.com/harshafaik/CanFlow
edit_uri: edit/main/documentation/

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Components:
    - Simulator: simulator.md
    - Sensors: sensors.md
    - Producer: producer.md
    - Anomalies: anomalies.md
  - Machine Learning:
    - ML Journey: ml.md
    - Future Ideas: ideas.md
  - Fleet: fleet.md
  - Transformations: transformations.md
  - Infrastructure: infrastructure.md
  - Issues: issues.md
  - Performance: performance.md

docs_dir: documentation
site_dir: site

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
